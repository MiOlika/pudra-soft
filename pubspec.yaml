name: pudra_soft
description: "Сайт-визитка команды разработчиков Pudra Soft"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.2.5
  google_fonts: ^6.1.0
  video_player: ^2.8.1  # Для видео
  chewie: ^1.7.1
  carousel_slider: ^4.2.1  # Для красивой карусели
  flutter_launcher_icons: ^0.13.1
#  flutter pub run flutter_launcher_icons

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/videos/
    - assets/screenshots/

flutter_launcher_icons:
  image_path: "assets/images/doska_logo.png" # путь к вашему логотипу (минимум 512x512)
  web:
    generate: true
    image_path: "assets/images/doska_logo.png"
    background_color: "#ffffff"
    theme_color: "#0175c2"
